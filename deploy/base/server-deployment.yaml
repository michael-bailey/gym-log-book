apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-log-book-server
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gym-log-book-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gym-log-book-server
    spec:
      containers:
        - name: server
          image: ghcr.io/michael-bailey/gym-log-book/server:master
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: jdbc:sqlite:/data/db/database.sqlite
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: environment-secrets
                  key: USERNAME
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: environment-secrets
                  key: PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: environment-secrets
                  key: JWT_SECRET
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: gym-log-book-db
