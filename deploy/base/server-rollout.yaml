apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gym-log-book-server
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gym-log-book-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gym-log-book-server
    spec:
      containers:
        - name: server
          image: ghcr.io/michael-bailey/gym-log-book/server:master
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
