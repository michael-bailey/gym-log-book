# deploy/argocd/local-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gym-log-book-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/michael-bailey/gym-log-book.git
    targetRevision: master
    path: deploy/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: gym-log-book
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
