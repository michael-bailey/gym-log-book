apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gym-log-book

resources:
  - ../../base
  - certificate.yaml
  - ingressroute.yaml
  - traefik-services.yaml

patches:
  - path: rollout-patches.yaml
  - target:
      kind: Deployment
      name: gym-log-book-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/michael-bailey/gym-log-book/server:master
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: gym-log-book-web
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/michael-bailey/gym-log-book/web:master
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
