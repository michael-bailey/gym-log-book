apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: gym-log-book-web-traffic
spec:
  weighted:
    services:
      - name: gym-log-book-web-stable
        port: 80
        kind: Service
      - name: gym-log-book-web-preview
        port: 80
        kind: Service