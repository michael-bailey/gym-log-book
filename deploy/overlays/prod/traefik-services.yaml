apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: gym-log-book-server-traffic
  namespace: gym-log-book
spec:
  weighted:
    services:
      - name: gym-log-book-server-stable
        port: 8080
      - name: gym-log-book-server-preview
        port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: gym-log-book-web-traffic
  namespace: gym-log-book
spec:
  weighted:
    services:
      - name: gym-log-book-web-stable
        port: 80
      - name: gym-log-book-web-preview
        port: 80