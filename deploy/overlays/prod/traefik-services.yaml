apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: gym-log-book-server-traffic
spec:
  weighted:
    services:
      - name: gym-log-book-server-stable
        port: 8080
        kind: Service
      - name: gym-log-book-server-preview
        port: 8080
        kind: Service
