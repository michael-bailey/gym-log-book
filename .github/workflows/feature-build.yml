# .github/workflows/dev-build.yaml
name: Dev Build

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read
  packages: write

jobs:

  # ════════════════════════════════════════
  #  COMPILE
  # ════════════════════════════════════════

  compile:
    name: "[compile] all subprojects"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # compileKotlin* targets main sources only
      # test sources are compiled automatically by allTests in the test job
      - name: Compile shared
        run: |
          ./gradlew :gym_log_book_shared:compileKotlinJvm --no-daemon
          ./gradlew :gym_log_book_shared:compileKotlinWasmJs --no-daemon

      - name: Compile server
        run: ./gradlew :gym_log_book_server:compileKotlin --no-daemon

      - name: Compile client
        run: |
          ./gradlew :gym_log_book_client:compileKotlinDesktop --no-daemon
          ./gradlew :gym_log_book_client:compileKotlinWasmJs --no-daemon

      - name: Upload shared build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-shared
          path: gym_log_book_shared/build/
          retention-days: 1

      - name: Upload server build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-server
          path: gym_log_book_server/build/
          retention-days: 1

      - name: Upload client build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-client
          path: gym_log_book_client/build/
          retention-days: 1

  # ════════════════════════════════════════
  #  TEST
  # ════════════════════════════════════════

  test:
    name: "[test] all subprojects"
    runs-on: ubuntu-latest
    needs: compile                         # fix 1: must wait for compile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java                   # fix 2: was missing entirely
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download shared build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-shared
          path: gym_log_book_shared/build/ # fix 3: was downloading to shared/build/

      - name: Download server build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-server
          path: gym_log_book_server/build/ # fix 3: was missing entirely

      - name: Download client build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-client
          path: gym_log_book_client/build/ # fix 3: was missing entirely

      - name: Run all tests
        run: ./gradlew allTests --no-daemon

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            gym_log_book_shared/build/reports/tests/
            gym_log_book_server/build/reports/tests/
            gym_log_book_client/build/reports/tests/
          retention-days: 7

  # ════════════════════════════════════════
  #  CONTAINERISE — web client (nginx + wasm)
  # ════════════════════════════════════════

  containerise_web:
    name: "[docker] build web client"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download shared build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-shared
          path: gym_log_book_shared/build/

      - name: Download client build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-client
          path: gym_log_book_client/build/

      - name: Build WASM distribution
        run: ./gradlew :gym_log_book_client:wasmJsBrowserDistribution --no-daemon

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gym_log_book_client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ════════════════════════════════════════
  #  CONTAINERISE — server
  # ════════════════════════════════════════

  containerise_server:
    name: "[docker] build server"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download shared build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-shared
          path: gym_log_book_shared/build/

      - name: Download server build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-server
          path: gym_log_book_server/build/

      - name: Build fat JAR
        run: ./gradlew :gym_log_book_server:shadowJar --no-daemon

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./gym_log_book_server        # ← context is the subproject dir
          file: ./gym_log_book_server/docker/server.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ github.event.number }}.${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max