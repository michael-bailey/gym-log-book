# .github/workflows/dev-build.yaml
name: Dev Build

on:
  push:
    branches:
      - 'feature/**'
      - 'developer'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          sha="${GITHUB_SHA::7}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=false --sbom=false \
            -t ghcr.io/${owner}/gym-log-book-server:dev-${sha} \
            -f docker/server.Dockerfile --push .

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=false --sbom=false \
            -t ghcr.io/${owner}/gym-log-book-web:dev-${sha} \
            -f docker/web.Dockerfile --push .