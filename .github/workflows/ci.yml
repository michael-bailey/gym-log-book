name: CI

on:
  pull_request:
    paths-ignore:
      - deploy/overlays/prod/image-patches.yaml
  push:
    branches:
      - master
    paths-ignore:
      - deploy/overlays/prod/image-patches.yaml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Validate Gradle builds
        run: |
          ./gradlew \
            :gym_log_book_shared:compileKotlinJvm \
            :gym_log_book_server:test \
            :gym_log_book_server:buildFatJar \
            :gym_log_book_client:desktopTest \
            :gym_log_book_client:wasmJsBrowserDistribution \
            :gym_log_book_client:desktopFatJar \
            --console=plain

      - name: Render local manifests
        run: kubectl kustomize deploy/overlays/local > /tmp/local.yaml

      - name: Render prod manifests
        run: kubectl kustomize deploy/overlays/prod > /tmp/prod.yaml

      - name: Upload desktop jar
        uses: actions/upload-artifact@v4
        with:
          name: gym-log-book-desktop-jar
          path: gym_log_book_client/build/libs/*-all.jar
          if-no-files-found: error
