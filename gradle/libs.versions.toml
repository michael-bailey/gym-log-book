# --- Android: Compose ---------------------------------------------------------
composeBomVersion = "2026.03.01"
composeMaterialVersion = "1.6.1"
materialIconsExtendedVersion = "1.7.8"
material_version = "1.13.0"
uiTestJunit4Version = "1.10.6"
uiTestManifestVersion = "1.10.6"
uiToolingVersion = "1.10.6"

# --- Android: Core ------------------------------------------------------------
android_kotlin_core_version = "1.18.0"
android_appcompat_version = "1.7.1"
android_constraint_layout_version = "2.2.1"
coreSplashscreenVersion = "1.2.0"
lifecycleRuntimeKtxVersion = "2.10.0"

# --- Android: Navigation ------------------------------------------------------
navigation_version = "2.9.7"
navigation-fragment-version = "2.9.7"

# --- Android: DI (Hilt) -------------------------------------------------------
hilt_version = "2.58"
hiltNavigationComposeVersion = "1.3.0"

# --- Android: Room ------------------------------------------------------------
room_version = "2.8.4"

# --- Android: Work Manager ----------------------------------------------------
workRuntimeVersion = "2.11.1"

# --- Android: Security --------------------------------------------------------
crypto_version = "1.1.0"

# --- Android: Wear OS ---------------------------------------------------------
playServicesWearableVersion = "19.0.0"
horologistComposeToolsVersion = "0.7.15"
tilesVersion = "1.5.0"
tilesMaterialVersion = "1.5.0"
watchfaceComplicationsDataSourceKtxVersion = "1.3.0"

# --- Android: Testing ---------------------------------------------------------
junit-version = "4.13.2"
junit = "1.3.0"
espresso_core_version = "3.7.0"
mockitoCoreVersion = "5.23.0"

# --- Shared / Multiplatform Libraries -----------------------------------------
jbcryptVersion = "0.4"
gson_version = "2.9.0"

# --- Shared / Testing ---------------------------------------------------------
mockk = "1.14.9"

# --- Server / ktor ------------------------------------------------------------
ktor = "3.4.2"
krpc = "0.10.2"

guava = "33.4.0-android"
guava-listenablefuture-version = "1.0"


# ==============================================================================
# LIBRARIES
# ==============================================================================

[libraries]

# --- Android: Core ------------------------------------------------------------
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "android_kotlin_core_version" }
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "android_appcompat_version" }
androidx-constraintlayout = { module = "androidx.constraintlayout:constraintlayout", version.ref = "android_constraint_layout_version" }
androidx-core-splashscreen = { module = "androidx.core:core-splashscreen", version.ref = "coreSplashscreenVersion" }
lifecycle-ktx = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtxVersion" }
livedata-ktx = { module = "androidx.lifecycle:lifecycle-livedata-ktx" }
androidx-livedata = { module = "androidx.compose.runtime:runtime-livedata" }

# --- Android: Compose ---------------------------------------------------------
compose-bom = { module = "androidx.compose:compose-bom", version.ref = "composeBomVersion" }
compose-activity = { module = "androidx.activity:activity-compose" }
compose-ui = { module = "androidx.compose.ui:ui" }
compose-ui-graphics = { module = "androidx.compose.ui:ui-graphics" }
compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview" }
compose-multiplatform-ui-tooling-preview = { module = "org.jetbrains.compose.ui:ui-tooling-preview", version.ref = "compose-multiplatform" }
compose-multiplatform-ui-tooling = { module = "org.jetbrains.compose.ui:ui-tooling", version.ref = "compose-multiplatform" }
compose-material = { module = "androidx.compose.material:material" }
compose-material3 = { module = "androidx.compose.material3:material3" }
compose-material-icons-extended = { module = "androidx.compose.material:material-icons-extended", version.ref = "materialIconsExtendedVersion" }
material = { module = "com.google.android.material:material", version.ref = "material_version" }

# --- Android: Navigation ------------------------------------------------------
navigation-compose = { module = "androidx.navigation:navigation-compose", version.ref = "navigation_version" }
navigation-runtime = { module = "androidx.navigation:navigation-runtime-ktx", version.ref = "navigation_version" }
navigation-fragment-ktx = { module = "androidx.navigation:navigation-fragment-ktx", version.ref = "navigation-fragment-version" }
navigation-ui-ktx = { module = "androidx.navigation:navigation-ui-ktx", version.ref = "navigation-fragment-version" }

# --- Android: DI (Hilt) -------------------------------------------------------
hilt-android = { module = "com.google.dagger:hilt-android", version.ref = "hilt_version" }
hilt-compiler = { module = "com.google.dagger:hilt-android-compiler", version.ref = "hilt_version" }
hilt-navigation = { module = "androidx.hilt:hilt-navigation-compose", version.ref = "hiltNavigationComposeVersion" }

# --- Android: Room ------------------------------------------------------------
room-runtime = { module = "androidx.room:room-runtime", version.ref = "room_version" }
room-ktx = { module = "androidx.room:room-ktx", version.ref = "room_version" }
room-compiler = { module = "androidx.room:room-compiler", version.ref = "room_version" }

# --- Android: Work Manager ----------------------------------------------------
work-manager = { module = "androidx.work:work-runtime", version.ref = "workRuntimeVersion" }

# --- Android: Security --------------------------------------------------------
android-crypto = { module = "androidx.security:security-crypto", version.ref = "crypto_version" }

# --- Android: Wear OS ---------------------------------------------------------
play-services-wearable = { module = "com.google.android.gms:play-services-wearable", version.ref = "playServicesWearableVersion" }
wear-compose-foundation = { module = "androidx.wear.compose:compose-foundation", version.ref = "composeMaterialVersion" }
wear-compose-material = { module = "androidx.wear.compose:compose-material", version.ref = "composeMaterialVersion" }
androidx-tiles = { module = "androidx.wear.tiles:tiles", version.ref = "tilesVersion" }
androidx-tiles-material = { module = "androidx.wear.tiles:tiles-material", version.ref = "tilesMaterialVersion" }
androidx-tiles-tooling-preview = { module = "androidx.wear.tiles:tiles-tooling-preview", version.ref = "tilesMaterialVersion" }
androidx-watchface-complications-data-source-ktx = { module = "androidx.wear.watchface:watchface-complications-data-source-ktx", version.ref = "watchfaceComplicationsDataSourceKtxVersion" }
horologist-compose-tools = { module = "com.google.android.horologist:horologist-compose-tools", version.ref = "horologistComposeToolsVersion" }
horologist-tiles = { module = "com.google.android.horologist:horologist-tiles", version.ref = "horologistComposeToolsVersion" }

# Fix for Hilt / Tiles ListenableFuture compilation error
guava-android = { module = "com.google.guava:guava", version.ref = "guava" }

# --- Android: Testing ---------------------------------------------------------
junit = { module = "junit:junit", version.ref = "junit-version" }
junit-android = { module = "androidx.test.ext:junit", version.ref = "junit" }
espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "espresso_core_version" }
mockito-core = { module = "org.mockito:mockito-core", version.ref = "mockitoCoreVersion" }
androidx-ui-test-junit4 = { module = "androidx.compose.ui:ui-test-junit4", version.ref = "uiTestJunit4Version" }
androidx-ui-test-manifest = { module = "androidx.compose.ui:ui-test-manifest", version.ref = "uiTestManifestVersion" }
androidx-ui-tooling = { module = "androidx.compose.ui:ui-tooling", version.ref = "uiToolingVersion" }

# --- Shared / Multiplatform Libraries -----------------------------------------
datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "datetime" }
serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "serialization" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
jbcrypt = { module = "org.mindrot:jbcrypt", version.ref = "jbcryptVersion" }
gson = { module = "com.google.code.gson:gson", version.ref = "gson_version" }

# --- Shared / RPC -------------------------------------------------------------
krpc-core = { module = "org.jetbrains.kotlinx:kotlinx-rpc-core", version.ref = "krpc" }
krpc-client = { module = "org.jetbrains.kotlinx:kotlinx-rpc-krpc-client", version.ref = "krpc" }
krpc-ktor-client = { module = "org.jetbrains.kotlinx:kotlinx-rpc-krpc-ktor-client", version.ref = "krpc" }
