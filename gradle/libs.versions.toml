# ==============================================================================
# VERSIONS
# ==============================================================================

[versions]

# --- Kotlin & Build Tools -----------------------------------------------------
kotlin = "2.3.20"
coroutines = "1.10.2"
serialization = "1.11.0"
datetime = "0.7.1"
agp = "8.9.1"
ksp = "2.3.0"
koin = "4.2.1"
