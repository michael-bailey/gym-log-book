ktor-serialization-kotlinx-json = { module = "io.ktor:ktor-serialization-kotlinx-json", version.ref = "ktor" }

# --- Server / ktor ------------------------------------------------------------
ktor-server-core = { module = "io.ktor:ktor-server-core-jvm", version.ref = "ktor" }
ktor-server-netty = { module = "io.ktor:ktor-server-netty-jvm", version.ref = "ktor" }
ktor-server-config = { module = "io.ktor:ktor-server-config-yaml-jvm", version.ref = "ktor" }
ktor-server-content-negotiation = { module = "io.ktor:ktor-server-content-negotiation-jvm", version.ref = "ktor" }
ktor-server-websockets = { module = "io.ktor:ktor-server-websockets-jvm", version.ref = "ktor" }
ktor-server-test-host = { module = "io.ktor:ktor-server-test-host-jvm", version.ref = "ktor" }
ktor-server-auth = { module = "io.ktor:ktor-server-auth", version.ref = "ktor" }
ktor-server-jwt = { module = "io.ktor:ktor-server-auth-jwt", version.ref = "ktor" }


koin-core = { module = "io.insert-koin:koin-core", version.ref = "koin" }
koin-annotations = { module = "io.insert-koin:koin-annotations", version.ref = "koin" }
ktor-server-koin = { module = "io.insert-koin:koin-ktor", version.ref = "koin" }
koin-logger-slf4j = { module = "io.insert-koin:koin-logger-slf4j", version.ref = "koin" }

# --- Shared / Testing ---------------------------------------------------------
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
kotlin-test-junit = { module = "org.jetbrains.kotlin:kotlin-test-junit", version.ref = "kotlin" }
kotlin-testCoroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }

# --- Client -------------------------------------------------------------------
koin-compose = { module = "io.insert-koin:koin-compose", version.ref = "koin" }
koin-compose-viewmodel = { module = "io.insert-koin:koin-compose-viewmodel", version.ref = "koin" }
kotlinx-coroutines-swing = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-swing", version.ref = "coroutines" }

adaptive = { module = "org.jetbrains.compose.material3.adaptive:adaptive", version.ref = "adaptive" }
adaptive-layout = { module = "org.jetbrains.compose.material3.adaptive:adaptive-layout", version.ref = "adaptive" }

# ==============================================================================
# BUNDLES
# ==============================================================================

[bundles]
compose = ["compose-activity", "compose-ui", "compose-ui-graphics", "compose-ui-tooling-preview"]
hilt = ["hilt-android", "hilt-navigation"]
lifecycle = ["lifecycle-ktx", "androidx-livedata", "livedata-ktx"]
material-design = ["material", "compose-material", "compose-material3", "compose-material-icons-extended"]
navigation = ["navigation-compose", "navigation-runtime"]
room = ["room-runtime", "room-ktx"]
shared-contract = [
    "datetime",
    "serialization-json",
    "kotlinx-coroutines-core",
    "krpc-core",
    "koin-core",
]
ktor-client-common = [
    "ktor-client-core",
    "ktor-client-content-negotiation",
    "ktor-serialization-kotlinx-json",
    "krpc-client",
    "krpc-ktor-client",
    "krpc-serialization-json",
    "koin-core",
]
ktor-client-jvm = [
    "ktor-client-cio",
]
ktor-client-wasm = [
    "ktor-client-js-wasm",
]
ktor-server = [
    "ktor-server-core",
    "ktor-server-netty",
    "ktor-server-config",
    "ktor-server-content-negotiation",
    "ktor-server-websockets",
    "ktor-server-koin",
    "koin-logger-slf4j",
    "koin-core",
    "koin-annotations",
    "krpc-server",
    "krpc-ktor-server",
    "krpc-serialization-json",
    "ktor-server-auth",
    "ktor-server-jwt"
]
test = [
    "kotlin-test",
    "kotlin-testCoroutines",
    "mockk",
]

koinClient = [
    "koin-compose",
    "koin-compose-viewmodel"
]

desktop = [
    "kotlinx-coroutines-swing"
]

composeMultiplatform = [
    "adaptive",
    "adaptive-layout",
]


# ==============================================================================
# PLUGINS
# ==============================================================================

[plugins]
# --- Shared / Build Tools ----------------------------------------------------------
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
krpc = { id = "org.jetbrains.kotlinx.rpc.plugin", version.ref = "krpc" }
koinCompiler = { id = "io.insert-koin.compiler.plugin", version.ref = "koin-plugin" }

# --- Android ------------------------------------------------------------------
androidApplication = { id = "com.android.application", version.ref = "agp" }
androidLibrary = { id = "com.android.library", version.ref = "agp" }
kotlinAndroid = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt_version" }
serialisation = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }

# --- Multiplatform (Desktop + Wasm) -------------------------------------------

kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
composeMultiplatform = { id = "org.jetbrains.compose", version.ref = "compose-multiplatform" }
composeCompiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }

# --- Server (Ktor) ------------------------------------------------------------
kotlinJvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
ktorServer = { id = "io.ktor.plugin", version.ref = "ktor" }
